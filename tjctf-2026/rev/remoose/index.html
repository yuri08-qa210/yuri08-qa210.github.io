      currentLang = currentLang === 'vi' ? 'en' : 'vi';
      const btn = document.getElementById('lang-btn');
      btn.textContent = currentLang === 'vi' ? 'Switch to English' : 'Chuyển sang Tiếng Việt';
      handleCommand('clear');
      handleCommand('help');
      playAudio('https://www.soundjay.com/buttons/button-1.mp3', 0.3);
    }

    const cmds = {
      help: () => L[currentLang].help,
      intro: () => L[currentLang].intro,
      corruption1: () => L[currentLang].corruption1,
      corruption2: () => L[currentLang].corruption2,
      resurrection: () => L[currentLang].resurrection,
      logic: () => L[currentLang].logic,
      code: () => L[currentLang].code,
      clear: () => { output.innerHTML = ''; return ''; },
      banner: () => `<span class="info">
 ____  _                           ____ _               _           
|  _ \\(_) ___ ___ _ __   ___ _ __ / ___| |__   ___  ___| | _____   
| |_) | |/ __/ _ \\ '_ \\ / _ \\ '__| |   | '_ \\ / _ \\/ __| |/ / __|  
|  _ <| | (_|  __/ |_) |  __/ |  | |___| | | |  __/ (__|   <\\__ \\  
|_| \\_\\_|\\___\\___| .__/ \\___|_|   \\____|_| |_|\\___|\\___|_|\\_\\___/  
                 |_|                                                 </span>`
    };

    function handleCommand(cmd) {
      const c = cmd.trim().toLowerCase();
      if(!c) return;
      print(`<span class="cmd">root@tjctf</span>:<span class="arg">~/rev</span>$ ${cmd}`);
      playAudio('https://www.soundjay.com/buttons/button-5.mp3', 0.15);
      
      if (cmds[c]) {
        const res = cmds[c]();
        if (res) print(res);
      } else {
        print(`<span class="error">Command not found: ${c}. Type 'help' for navigation.</span>`);
      }
      input.value = '';
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); handleCommand(input.value); }
      else playAudio('https://www.soundjay.com/buttons/button-8.mp3', 0.02);
    });

    tBody.addEventListener('click', () => input.focus());

    document.getElementById('start-button').addEventListener('click', () => {
      userInteracted = true;
      const ws = document.getElementById('welcome-screen');
      ws.classList.add('hidden');
      setTimeout(() => { handleCommand('banner'); handleCommand('help'); input.focus(); }, 800);
      playAudio('https://www.soundjay.com/buttons/button-10.mp3', 0.4);
    });
  </script>
</body>
</html>
