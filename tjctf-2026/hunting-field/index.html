<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuri08 - TJCTF 2026: Hunting Field</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --main: #ef4444; --main2: #10b981; --main-light: #f87171;
      --bg: #0f0f1a; --bg2: #181a2a; --glass: rgba(30, 25, 60, 0.9);
      --text: #e0e7ef; --shadow: 0 8px 32px 0 #ef444433;
      --glow: 0 0 20px 2px #ef444444; --highlight: #38bdf8;
    }
    html, body {
      min-height: 100%; margin: 0; font-family: 'JetBrains Mono', monospace;
      background: radial-gradient(circle at 50% 0%, #2a1a1a 0%, #0f0f1a 100%);
      color: var(--text); overflow: hidden; perspective: 1000px;
    }
    #particles-js {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
    }
    .content-wrapper {
      position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column;
      padding: 20px; box-sizing: border-box; gap: 15px;
    }
    
    .header {
      display: flex; align-items: center; gap: 20px; padding: 15px;
      background: var(--glass); border-radius: 1rem; border: 1px solid #ef444444;
      box-shadow: var(--shadow); backdrop-filter: blur(10px); flex-shrink: 0;
    }
    .avatar {
      width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--main);
      object-fit: cover; box-shadow: 0 0 15px var(--main);
    }
    .header-info h1 {
      font-size: 1.8rem; margin: 0; color: var(--main);
      text-shadow: 0 0 10px #ef444488; animation: neonRed 2s infinite alternate;
    }
    .header-info p { margin: 5px 0 0 0; color: var(--main-light); font-size: 0.9rem; }
    @keyframes neonRed { to { text-shadow: 0 0 15px var(--main), 0 0 30px var(--main); } }
    
    .lang-toggle {
      margin-left: auto; background: var(--main); color: white; border: none;
      padding: 8px 15px; border-radius: 0.5rem; cursor: pointer; font-family: inherit;
      font-weight: bold; transition: 0.3s; box-shadow: 0 0 10px #ef444455;
    }
    .lang-toggle:hover { background: #dc2626; transform: scale(1.05); }

    .terminal-pro {
      background: linear-gradient(135deg, #1a1215 80%, #ef444411 100%);
      border-radius: 1rem; border: 1px solid #3f212155; box-shadow: var(--shadow), var(--glow);
      display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; position: relative;
    }
    .terminal-pro::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
      pointer-events: none; z-index: 2; opacity: 0.2;
    }
    .terminal-bar {
      background: #1e1e2e; height: 2.5rem; display: flex; align-items: center;
      padding: 0 1rem; border-bottom: 1px solid #312e8155; flex-shrink: 0; z-index: 3;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 6px; }
    .red { background: #ef4444; } .yellow { background: #facc15; } .green { background: #22c55e; }
    .terminal-title { color: var(--main-light); margin-left: 1rem; font-weight: bold; letter-spacing: 1px; }
    
    .terminal-body {
      padding: 1.5rem; flex-grow: 1; overflow-y: auto; font-size: 0.95rem;
      line-height: 1.6; position: relative; z-index: 1; scroll-behavior: smooth;
    }
    #terminal-output { white-space: pre-wrap; word-break: break-word; }
    #terminal-input-line {
      display: flex; align-items: center; gap: 0.5em; margin-top: 1em; z-index: 3;
    }
    #terminal-input {
      background: transparent; border: none; color: #a7f3d0; outline: none;
      font-family: inherit; font-size: 1em; width: 100%; caret-color: var(--main);
    }
    
    .cmd { color: #7c3aed; } .arg { color: #a78bfa; } .info { color: #38bdf8; font-weight: bold; }
    .error { color: #ef4444; } .success { color: #10b981; } .warning { color: #facc15; }
    .code-block {
      background: #0d0d1a; border-left: 3px solid var(--main); padding: 10px 15px;
      margin: 10px 0; border-radius: 0 5px 5px 0; font-size: 0.9rem; color: #d1d5db;
    }
    
    .terminal-body::-webkit-scrollbar { width: 8px; }
    .terminal-body::-webkit-scrollbar-track { background: #0f0f1a; }
    .terminal-body::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 4px; }

    #welcome-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #0f0f1a; z-index: 10000; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center; transition: opacity 0.8s;
    }
    #welcome-screen.hidden { opacity: 0; pointer-events: none; }
    #start-button {
      background: var(--main); color: white; border: none; border-radius: 0.7rem;
      padding: 1rem 2rem; font-size: 1.2rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all 0.3s; box-shadow: 0 0 20px #ef444488;
    }
    #start-button:hover { background: #dc2626; transform: translateY(-3px); }
    
    #mute-button {
      position: fixed; top: 20px; right: 20px; z-index: 10001;
      background: #1e1e2e; color: var(--main-light); border: 1px solid #ef444455;
      border-radius: 50%; width: 40px; height: 40px; font-size: 1.2rem; cursor: pointer;
      display: flex; justify-content: center; align-items: center; transition: all 0.3s;
    }
    #mute-button:hover { background: var(--main); color: white; }

    @media (max-width: 768px) {
      .header { flex-wrap: wrap; justify-content: center; text-align: center; }
      .lang-toggle { margin-left: 0; margin-top: 10px; width: 100%; }
      .avatar { width: 60px; height: 60px; }
      .header-info h1 { font-size: 1.4rem; }
    }
  </style>

        vuln: `<span class="info">[ PHÂN TÍCH LỖI: STACK BUFFER UNDERFLOW ]</span>
Game có một cơ chế log input không hợp lệ (invalid input). Thay vì ghi xuôi từ đầu mảng, nó ghi NGƯỢC từ cuối mảng <span class="arg">input_log[63]</span>:

<div class="code-block">*array_ptr = player_input[0];
array_ptr -= sizeof(player_input[0]);
*array_ptr = player_input[1];
array_ptr -= sizeof(player_input[1]);</div>

<span class="error">Lỗi chí mạng:</span> Con trỏ <span class="cmd">array_ptr</span> không có cơ chế kiểm tra biên (bounds check) khi lùi. Nếu ta liên tục gửi input rác (invalid input), con trỏ sẽ lùi từ từ, vượt qua biên của mảng <span class="arg">input_log</span> và xâm nhập vào các vùng nhớ khác trên stack nằm dưới mảng (địa chỉ thấp hơn). Đây là kỹ thuật <span class="warning">Stack Buffer Underflow</span> kinh điển!`,
        layout: `<span class="info">[ STACK LAYOUT & LITTLE-ENDIAN TRICK ]</span>
Vì các biến cục bộ được cấp phát trên stack, và stack phát triển từ địa chỉ cao xuống thấp, biến <span class="cmd">killCt</span> nằm ngay "dưới" mảng <span class="arg">input_log</span> trong memory.

Mục tiêu: Ghi đè killCt = <span class="success">0x68756e74</span>
Trong hệ thống Little-Endian (như x86/64), byte thấp nằm ở địa chỉ thấp. Số 0x68756e74 được lưu trong RAM thành: <span class="arg">74 6e 75 68</span> ('t', 'n', 'u', 'h').

Vì con trỏ ghi lùi, ta phải đưa payload theo thứ tự ngược trong RAM, tức là đưa 't', 'n', 'u', 'h'. Đó là lý do ta gửi chuỗi <span class="cmd">"tnuh"</span> (chia làm 2 cặp input "hu" và "nt" theo thứ tự ghi lùi của code).`,
        strategy: `<span class="info">[ CHIẾN THUẬT KHAI THÁC ]</span>

3. <span class="cmd">Bước 3 - Kích hoạt Victory:</span> Gửi các lệnh di chuyển hợp lệ (valid moves) để kết thúc game, hàm <span class="cmd">game_over()</span> được gọi, đọc killCt và in Flag!`,
        code: `<span class="info">[ EXPLOIT SOURCE CODE ]</span>
<div class="code-block">#!/usr/bin/env python3

import sys

HOST = sys.argv[1] if len(sys.argv) > 1 else "tjc.tf"

                out += chunk
                if b"tjctf{" in out.lower(): break

      },
      en: {
        help: `<span class="info">[ WRITEUP NAVIGATION ]</span>
<span class="cmd">intro</span>       : Challenge Overview & Victory Mechanism
<span class="cmd">vuln</span>        : Vulnerability Analysis - Stack Buffer Underflow

        intro: `<span class="info">[ OVERVIEW: HUNTING FIELD ]</span>

        vuln: `<span class="info">[ VULNERABILITY: STACK BUFFER UNDERFLOW ]</span>
The game logs invalid inputs. Instead of logging forward from the start of the array, it writes BACKWARD starting from the end of <span class="arg">input_log[63]</span>:

<div class="code-block">*array_ptr = player_input[0];
array_ptr -= sizeof(player_input[0]);

array_ptr -= sizeof(player_input[1]);</div>

        layout: `<span class="info">[ STACK LAYOUT & LITTLE-ENDIAN TRICK ]</span>
Because local variables are allocated on the stack (which grows downwards), <span class="cmd">killCt</span> is located right "below" the <span class="arg">input_log</span> array in memory.

        strategy: `<span class="info">[ EXPLOIT STRATEGY ]</span>

        code: `<span class="info">[ EXPLOIT SOURCE CODE ]</span>

                if b"tjctf{" in out.lower(): break
            except socket.timeout:

    print(out.decode(errors="replace"))

if __name__ == "__main__":

      }
    };

    function toggleLang() {
      currentLang = currentLang === 'vi' ? 'en' : 'vi';
      const btn = document.getElementById('lang-btn');
      btn.textContent = currentLang === 'vi' ? 'Switch to English' : 'Chuyển sang Tiếng Việt';
      handleCommand('clear');
      handleCommand('help');
      playAudio('https://www.soundjay.com/buttons/button-1.mp3', 0.3);
    }

    const cmds = {
      help: () => L[currentLang].help,

      vuln: () => L[currentLang].vuln,

    function handleCommand(cmd) {
      const c = cmd.trim().toLowerCase();
      if(!c) return;
      print(`<span class="cmd">root@tjctf</span>:<span class="arg">~/pwn</span>$ ${cmd}`);
